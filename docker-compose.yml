version: '3.8'

services:
  # 1. DATABASE SERVICE
  db:
    image: postgres:15-alpine
    container_name: astrocrm-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - astrocrm-network

  # 2. BACKEND API SERVICE
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: astrocrm-backend
    ports:
      - "${PORT}:5000"
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - astrocrm-network

  # 3. FRONTEND SERVICE
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: astrocrm-frontend
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
      NODE_ENV: ${NODE_ENV}
    depends_on:
      - backend
    networks:
      - astrocrm-network

networks:
  astrocrm-network:
    driver: bridge

volumes:
  db_data:
